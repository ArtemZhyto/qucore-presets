services:
  <SERVICE_NAME>:
    build:
      context: ../services/<SERVICE_NAME>
      dockerfile: dockerfile
    volumes:
      - ../services/<SERVICE_NAME>/src:/app/src
      - ../services/<SERVICE_NAME>/package.json:/app/package.json
      - ../services/<SERVICE_NAME>/package-lock.json:/app/package-lock.json
      - ../libs:/app/libs
    command: npm run dev
    ports:
      - '${SERVICE_PORT}:${SERVICE_PORT}'
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: always
    env_file:
      - .env
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
